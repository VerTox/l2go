services:
  postgres:
    image: postgres:16-alpine
    container_name: l2go-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: l2go_login
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d l2go_login"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    networks:
      - l2go-network

  loginserver:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: l2go-loginserver
    ports:
      - "2106:2106"  # Client connections
      - "9014:9014"  # GameServer connections
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - l2go-network
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USERNAME=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DATABASE=l2go_login
      - POSTGRES_MIGRATION_DIR=./migrations
      - LOGIN_SERVER_HOST=0.0.0.0
      - LOGIN_SERVER_PORT=2106
      - GAME_SERVER_PORT=9014
      - LOG_LEVEL=info
      - AUTO_CREATE_ACCOUNTS=true
    volumes:
      - ./cmd/loginserver/.env:/app/.env:ro
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 2106 || exit 1"]
      interval: 30s
      timeout: 3s
      retries: 3

  gameserver:
    build:
      context: .
      dockerfile: Dockerfile.gameserver
    container_name: l2go-gameserver
    ports:
      - "7777:7777"  # Client connections
      - "2112:2112"  # Prometheus /metrics (tick-health, l2go-5pc)
    depends_on:
      postgres:
        condition: service_healthy
      loginserver:
        condition: service_started
    restart: unless-stopped
    networks:
      - l2go-network
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USERNAME=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DATABASE=l2go_gameserver
      - LOGIN_SERVER_HOST=loginserver
      - LOGIN_SERVER_PORT=9014
      - GAME_HOST=0.0.0.0
      - GAME_PORT=7777
      - GAME_SERVER_PORT=7777
      - EXTERNAL_HOST=${EXTERNAL_HOST:-127.0.0.1}
      - LOG_LEVEL=info
    # Datapack (NPC/item/skill XML, spawnlist.sql) is baked into the image via
    # `COPY datapack` in Dockerfile.gameserver — no bind-mount needed.
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 7777 || exit 1"]
      interval: 30s
      timeout: 3s
      retries: 3

  adminer:
    image: adminer:latest
    container_name: l2go-adminer
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    restart: unless-stopped
    networks:
      - l2go-network
    environment:
      ADMINER_DEFAULT_SERVER: postgres

  prometheus:
    image: prom/prometheus:latest
    container_name: l2go-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    restart: unless-stopped
    networks:
      - l2go-network

  grafana:
    # Pinned to a stable OSS release: :latest ships the experimental unified-storage
    # provisioning pipeline which crash-loops on file-provisioned dashboards.
    image: grafana/grafana:11.6.0
    container_name: l2go-grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    volumes:
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    environment:
      # Dev-only: anonymous admin so the dashboard opens without a login prompt.
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
    restart: unless-stopped
    networks:
      - l2go-network

volumes:
  postgres_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  l2go-network:
    driver: bridge